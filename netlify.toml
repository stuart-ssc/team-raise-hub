[build]
  publish = "dist"

# Sitemap redirects - proxy to Supabase edge function
[[redirects]]
  from = "/sitemap.xml"
  to = "https://tfrebmhionpuowpzedvz.supabase.co/functions/v1/generate-sitemap?type=index"
  status = 200
  force = true

[[redirects]]
  from = "/sitemaps/static"
  to = "https://tfrebmhionpuowpzedvz.supabase.co/functions/v1/generate-sitemap?type=static"
  status = 200
  force = true

[[redirects]]
  from = "/sitemaps/schools/:state"
  to = "https://tfrebmhionpuowpzedvz.supabase.co/functions/v1/generate-sitemap?type=schools&state=:state"
  status = 200
  force = true

[[redirects]]
  from = "/sitemaps/districts/:state"
  to = "https://tfrebmhionpuowpzedvz.supabase.co/functions/v1/generate-sitemap?type=districts&state=:state"
  status = 200
  force = true

[[redirects]]
  from = "/sitemaps/campaigns/:state"
  to = "https://tfrebmhionpuowpzedvz.supabase.co/functions/v1/generate-sitemap?type=campaigns&state=:state"
  status = 200
  force = true
