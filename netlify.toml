[build]
  publish = "dist"
  functions = "netlify/functions"

# Sitemap routes to Netlify function
[[redirects]]
  from = "/sitemap.xml"
  to = "/.netlify/functions/sitemap?type=index"
  status = 200

[[redirects]]
  from = "/sitemaps/static"
  to = "/.netlify/functions/sitemap?type=static"
  status = 200

[[redirects]]
  from = "/sitemaps/schools/:state"
  to = "/.netlify/functions/sitemap?type=schools&state=:state"
  status = 200

[[redirects]]
  from = "/sitemaps/districts/:state"
  to = "/.netlify/functions/sitemap?type=districts&state=:state"
  status = 200

[[redirects]]
  from = "/sitemaps/campaigns/:state"
  to = "/.netlify/functions/sitemap?type=campaigns&state=:state"
  status = 200
